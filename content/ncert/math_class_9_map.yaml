# Critical JEE foundation concepts from Class 9:
jee_foundation_concepts:
  primary_concepts:
    - cartesian_system              # Chapter 3 - Essential for coordinate geometry
    - distance_formula              # Chapter 3 - JEE staple
    - section_formula               # Chapter 3 - Important for JEE
    - triangle_similarity           # Chapter 7 - Foundation for trigonometry
    - pythagorean_theorem           # Chapter 7 - Used throughout JEE
    - circle_properties            # Chapter 10 - Foundation for trigonometry
    - circle_theorems               # Chapter 10 - Important for JEE geometry
    - area_triangles_advanced       # Chapter 9 - Used in coordinate geometry
  
  algebra_foundation:
    - polynomial_basics             # Chapter 2 - Foundation for advanced algebra
    - remainder_theorem             # Chapter 2 - Important for JEE
    - linear_equations_two_variables # Chapter 4 - Used in coordinate geometry

# Rescue ladder templates for Class 9 concepts:
rescue_ladder_templates:
  coordinate_geometry_progression:
    foundation: "plotting_points"           # Class 8 foundation
    intermediate: "distance_formula"         # Class 9, Chapter 3
    advanced: "section_formula"              # Class 9, Chapter 3
    jee_level: "coordinate_geometry_area"    # Class 10-11 concept
  
  triangle_progression:
    foundation: "triangle_basics"            # Class 7 foundation
    intermediate: "triangle_congruence"      # Class 7-8 concept
    advanced: "triangle_similarity"          # Class 9, Chapter 7
    jee_level: "advanced_triangle_geometry" # Class 11-12 concept
  
  circle_progression:
    foundation: "circle_basics"             # Class 8 foundation
    intermediate: "circle_properties"        # Class 9, Chapter 10
    advanced: "circle_theorems"              # Class 9, Chapter 10
    jee_level: "advanced_circle_geometry"   # Class 11-12 concept
  
  polynomial_progression:
    foundation: "algebraic_expressions"     # Class 7-8 foundation
    intermediate: "polynomial_basics"         # Class 9, Chapter 2
    advanced: "remainder_theorem"            # Class 9, Chapter 2
    jee_level: "polynomial_equations"        # Class 10-11 concept

# Content generation priorities for JEE preparation:
content_generation_priorities:
  highest_priority:
    - cartesian_system and related concepts
    - triangle similarity and Pythagorean theorem
    - circle properties and theorems
    - distance and section formulas
  
  high_priority:
    - polynomial concepts and remainder theorem
    - area formulas and applications
    - linear equations in two variables
  
  medium_priority:
    - Statistics and probability (less JEE relevant)
    - Constructions (practical but less theoretical)
    - Surface areas and volumes (moderate JEE relevance)