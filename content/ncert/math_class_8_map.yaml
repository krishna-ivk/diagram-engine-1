# Geometry focus for JEE preparation:
geometry_focus_concepts:
  primary_concepts:
    - quadrilateral_basics      # Chapter 3 - Foundation for polygons
    - polygon_vertices          # Chapter 3 - Essential for regular polygons
    - circle_basics             # Chapter 11 - Foundation for trigonometry
    - circle_area_circumference # Chapter 11 - Important for JEE
    - graph_basics              # Chapter 15 - Foundation for coordinate geometry
    - coordinate_plotting       # Chapter 15 - Essential for coordinate geometry
  
  jee_bridge_concepts:
    - These lead to:
    - Regular polygons (Class 9-10)
    - Coordinate geometry (Class 10-11)
    - Trigonometry (Class 10)
    - Advanced geometry (Class 11-12)

# Rescue ladder progression for geometry:
rescue_ladder_templates:
  polygon_progression:
    foundation: "quadrilateral_basics"     # Class 8, Chapter 3
    intermediate: "regular_polygon"          # Class 9 concept
    advanced: "regular_polygon_area"        # Class 10-11 concept
  
  coordinate_progression:
    foundation: "graph_basics"              # Class 8, Chapter 15
    intermediate: "coordinate_plotting"     # Class 8, Chapter 15
    advanced: "cartesian_system"            # Class 9-10 concept
  
  circle_progression:
    foundation: "circle_basics"             # Class 8, Chapter 11
    intermediate: "circle_area_circumference" # Class 8, Chapter 11
    advanced: "trigonometric_ratios"        # Class 10 concept

# Content generation guidelines:
content_generation_rules:
  do_copy:
    - Concept sequences from NCERT
    - Prerequisite relationships
    - Learning outcome structures
  
  do_not_copy:
    - NCERT textbook examples
    - Exercise problems verbatim
    - Explanations and solutions
    - Diagrams from textbooks
  
  create_instead:
    - Original questions aligned to concepts
    - New examples demonstrating concepts
    - Original explanations and solutions
    - Custom diagrams for visualization