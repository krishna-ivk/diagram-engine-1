# Concept Relationships for Rescue Ladder Generation
rescue_ladders:
  regular_polygon_progression:
    target: central_angle_regular_polygon
    levels:
      foundation: square_center_angle
      bridge: hexagon_center_angle
      intermediate: octagon_center_angle
      target: central_angle_regular_polygon
    
  coordinate_geometry_progression:
    target: coordinate_geometry_area
    levels:
      foundation: cartesian_system
      bridge: distance_formula
      intermediate: section_formula
      target: coordinate_geometry_area
    
  trigonometry_progression:
    target: trigonometric_identities
    levels:
      foundation: trigonometric_ratios
      bridge: unit_circle
      target: trigonometric_identities
    
  quadratic_progression:
    target: quadratic_formula
    levels:
      foundation: quadratic_standard_form
      bridge: discriminant
      target: quadratic_formula
    
  calculus_progression:
    target: integral_area
    levels:
      foundation: limits_intuitive
      bridge: derivative_geometric
      target: integral_area