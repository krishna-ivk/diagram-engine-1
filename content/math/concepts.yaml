# Math Concepts Taxonomy - Geometry Focus
# Structured for rescue ladder generation and prerequisite mapping

# Geometry Concepts - Regular Polygons Focus
basic_angle:
  name: Basic Angle Concepts
  subject: Mathematics
  chapter: Geometry
  class_level: Class 7-8
  prerequisites: []
  description: Understanding angle measurement and basic angle types
  rescue_templates: []
  diagram_required: false

circle_angle_360:
  name: Circle Angle Sum (360°)
  subject: Mathematics
  chapter: Geometry
  class_level: Class 7-8
  prerequisites: [basic_angle]
  description: Understanding that angles around a point sum to 360°
  rescue_templates: []
  diagram_required: true

polygon_vertices:
  name: Polygon Vertices and Sides
  subject: Mathematics
  chapter: Geometry
  class_level: Class 7-8
  prerequisites: [basic_angle]
  description: Understanding polygon structure, vertices, and sides
  rescue_templates: []
  diagram_required: true

regular_polygon:
  name: Regular Polygons
  subject: Mathematics
  chapter: Geometry
  class_level: Class 8-9
  prerequisites: [polygon_vertices]
  description: Properties of regular polygons with equal sides and angles
  rescue_templates: []
  diagram_required: true

square_center_angle:
  name: Square Central Angle
  subject: Mathematics
  chapter: Geometry
  class_level: Class 8
  prerequisites: [regular_polygon, circle_angle_360]
  description: Central angles in a square (90° each)
  rescue_templates: [triangle_center_angle]
  diagram_required: true

triangle_center_angle:
  name: Triangle Central Angle
  subject: Mathematics
  chapter: Geometry
  class_level: Class 8
  prerequisites: [regular_polygon, circle_angle_360]
  description: Central angles in an equilateral triangle (120° each)
  rescue_templates: []
  diagram_required: true

hexagon_center_angle:
  name: Hexagon Central Angle
  subject: Mathematics
  chapter: Geometry
  class_level: Class 9
  prerequisites: [square_center_angle]
  description: Central angles in a regular hexagon (60° each)
  rescue_templates: [square_center_angle, triangle_center_angle]
  diagram_required: true

octagon_center_angle:
  name: Octagon Central Angle
  subject: Mathematics
  chapter: Geometry
  class_level: Class 9-10
  prerequisites: [hexagon_center_angle]
  description: Central angles in a regular octagon (45° each)
  rescue_templates: [square_center_angle, triangle_center_angle, hexagon_center_angle]
  diagram_required: true

central_angle_regular_polygon:
  name: Central Angle of Regular Polygon
  subject: Mathematics
  chapter: Geometry
  class_level: Class 9-11
  prerequisites: [octagon_center_angle]
  description: "General formula for central angles: 360°/n"
  rescue_templates: [square_center_angle, hexagon_center_angle, octagon_center_angle]
  diagram_required: true

triangle_area:
  name: Triangle Area
  subject: Mathematics
  chapter: Geometry
  class_level: Class 7-9
  prerequisites: [polygon_vertices]
  description: Area of triangle using base and height
  rescue_templates: []
  diagram_required: true

regular_polygon_area:
  name: Regular Polygon Area
  subject: Mathematics
  chapter: Geometry
  class_level: Class 10-11
  prerequisites: [central_angle_regular_polygon, triangle_area]
  description: Area of regular polygon using triangulation method
  rescue_templates: [triangle_area, square_center_angle, hexagon_center_angle]
  diagram_required: true

